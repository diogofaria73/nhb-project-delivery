services:
  postgres:
    image: postgres:16-alpine
    container_name: nhb-status-report-postgres
    restart: unless-stopped
    # Host port not published on purpose to avoid clashing with other Postgres
    # containers on 5432. Inspect with:
    #   docker exec -it nhb-status-report-postgres psql -U postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nhb_status_report
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nhb-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: nhb-status-report:local
    container_name: nhb-status-report-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      # Internal DNS — `postgres` resolves to the postgres service on the
      # shared compose network.
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nhb_status_report?schema=public
      JWT_SECRET: nhb-local-secret-change-before-prod
      JWT_EXPIRATION: "28800"
      CORS_ORIGIN: http://localhost:3001
      STORAGE_DRIVER: local
      STORAGE_LOCAL_PATH: /app/storage
    ports:
      # Host port 3001 so the container can run side-by-side with a local
      # `pnpm dev` (NestJS dev server on host port 3000).
      - "3001:3000"
    volumes:
      - app_storage:/app/storage
    networks:
      - nhb-net

volumes:
  postgres_data:
  app_storage:

networks:
  nhb-net:
    driver: bridge
